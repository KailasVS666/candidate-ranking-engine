[pytest]
# ─── Test discovery ───────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Output style ─────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes

# ─── Custom markers ───────────────────────────────────────────────────────────
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    api:  marks tests that require the FastAPI server running
    nlp:  marks tests that require spaCy / sentence-transformers

# ─── Asyncio mode for FastAPI async tests ─────────────────────────────────────
asyncio_mode = auto
